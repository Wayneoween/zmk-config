name: Render Keymap

on:
  push:
    paths:
      - "config/sofle_choc_pro.keymap"
      - "config/sofle_choc_pro.json"
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          sudo apt-get install -y librsvg2-bin
          pip install keymap-drawer

      - name: Parse and draw keymap
        run: |
          mkdir -p keymap-img

          # Parse ZMK keymap to intermediate YAML
          keymap parse -z config/sofle_choc_pro.keymap > /tmp/keymap.yaml

          # Replace zmk_keyboard with local layout file (board not in upstream DB)
          sed -i 's|{zmk_keyboard: sofle_choc_pro}|{qmk_info_json: config/sofle_choc_pro.json}|' /tmp/keymap.yaml

          # Draw SVG (all layers in one image)
          keymap draw /tmp/keymap.yaml -o keymap-img/sofle_choc_pro.svg

          rsvg-convert keymap-img/sofle_choc_pro.svg -o keymap-img/sofle_choc_pro.png

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add keymap-img/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update keymap render"
            git push
          fi
